name: Release

# Tag push -> build macOS bundles and create a DRAFT GitHub Release.
# When the maintainer PUBLISHES that release -> update the Homebrew tap.
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'push' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Agent Hub v__VERSION__"
          releaseBody: |
            ## Agent Hub v__VERSION__

            Manage AI coding agents (Claude Code, Cursor, Codex) on your macOS machine.

            ### Install via Homebrew
            ```bash
            brew tap xiaoleiy/tap
            brew install --cask xiaoleiy/tap/agent-hub
            ```

            ### CLI Usage
            ```bash
            agent-hub status        # System status
            agent-hub agents        # List agents
            agent-hub sessions      # Active sessions
            agent-hub usage         # Usage + rate limits
            agent-hub keepalive 1h  # Prevent sleep for 1 hour
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Fires when the drafted release is manually published (not a prerelease).
  # Requires a TAP_GITHUB_TOKEN secret with write access to xiaoleiy/homebrew-tap.
  update-tap:
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version from the published release
        id: ver
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          echo "tag=${TAG}"          >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"

      - name: Download release DMGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "Agent.Hub_${VERSION}_aarch64.dmg" \
            --pattern "Agent.Hub_${VERSION}_x64.dmg" \
            --pattern "Agent.Hub_aarch64.app.tar.gz" \
            --pattern "Agent.Hub_x64.app.tar.gz" \
            --dir dist
          ls -la dist

      - name: Compute SHA256 checksums
        id: sha
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          ARM_SHA=$(sha256sum "dist/Agent.Hub_${VERSION}_aarch64.dmg" | cut -d' ' -f1)
          INTEL_SHA=$(sha256sum "dist/Agent.Hub_${VERSION}_x64.dmg"     | cut -d' ' -f1)
          TARBALL_ARM_SHA=$(sha256sum "dist/Agent.Hub_aarch64.app.tar.gz" | cut -d' ' -f1)
          TARBALL_INTEL_SHA=$(sha256sum "dist/Agent.Hub_x64.app.tar.gz"     | cut -d' ' -f1)
          echo "arm_sha=${ARM_SHA}"                 >> "$GITHUB_OUTPUT"
          echo "intel_sha=${INTEL_SHA}"             >> "$GITHUB_OUTPUT"
          echo "tarball_arm_sha=${TARBALL_ARM_SHA}"     >> "$GITHUB_OUTPUT"
          echo "tarball_intel_sha=${TARBALL_INTEL_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: xiaoleiy/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Rewrite Casks/agent-hub.rb
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          INTEL_SHA: ${{ steps.sha.outputs.intel_sha }}
        run: |
          set -euo pipefail
          CASK="homebrew-tap/Casks/agent-hub.rb"
          sed -i -E "s|^([[:space:]]*version[[:space:]]+).*|\1\"${VERSION}\"|" "$CASK"
          awk -v arm="$ARM_SHA" -v intel="$INTEL_SHA" '
            /^[[:space:]]*sha256[[:space:]]+"/ {
              n++
              if (n == 1) { sub(/"[0-9a-fA-F]*"/, "\"" arm "\"") }
              else if (n == 2) { sub(/"[0-9a-fA-F]*"/, "\"" intel "\"") }
            }
            { print }
          ' "$CASK" > "${CASK}.tmp" && mv "${CASK}.tmp" "$CASK"
          echo "----- updated cask -----"; cat "$CASK"

      - name: Rewrite Formula/agent-hub-cli.rb
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.tarball_arm_sha }}
          INTEL_SHA: ${{ steps.sha.outputs.tarball_intel_sha }}
        run: |
          set -euo pipefail
          F="homebrew-tap/Formula/agent-hub-cli.rb"
          sed -i -E "s|^([[:space:]]*version[[:space:]]+).*|\1\"${VERSION}\"|" "$F"
          awk -v arm="$ARM_SHA" -v intel="$INTEL_SHA" '
            /^[[:space:]]*sha256[[:space:]]+"/ {
              n++
              if (n == 1) { sub(/"[0-9a-fA-F]*"/, "\"" arm "\"") }
              else if (n == 2) { sub(/"[0-9a-fA-F]*"/, "\"" intel "\"") }
            }
            { print }
          ' "$F" > "${F}.tmp" && mv "${F}.tmp" "$F"
          cat "$F"

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."; exit 0
          fi
          git add Casks/agent-hub.rb Formula/agent-hub-cli.rb
          git commit -m "agent-hub ${VERSION}"
          git push
